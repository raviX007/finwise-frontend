server {
    listen 4100;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # Backend URL — override with BACKEND_URL env var at container start
        # Default: host.docker.internal (Mac), override to container name or IP on EC2
        proxy_pass http://finwise-backend:4000;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE-critical: disable ALL buffering
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;

        # Tell downstream proxies (ALB, CloudFront) not to buffer
        add_header X-Accel-Buffering no;

        # Long timeout for SSE streams (5 min)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
